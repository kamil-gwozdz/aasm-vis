AllCops:
  TargetRubyVersion: 2.6

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  Enabled: true
  EnforcedStyle: double_quotes

Layout/LineLength:
  Max: 120

# Example-heavy spec files legitimately exceed the default block length.
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
